name: Build Electron App
on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: mac
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Prepare macOS signing certificate
        if: matrix.platform == 'mac'
        shell: bash
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "${MAC_CERTIFICATE:-}" ]; then
            echo "MAC_CERTIFICATE is empty. Add the base64-encoded .p12 to repository secrets." >&2
            exit 1
          fi
          if [ -z "${MAC_CERTIFICATE_PASSWORD:-}" ]; then
            echo "MAC_CERTIFICATE_PASSWORD is empty. Add the .p12 password to repository secrets." >&2
            exit 1
          fi
          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_ID_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "Missing Apple notarization secrets. Configure APPLE_ID, APPLE_ID_PASSWORD and APPLE_TEAM_ID in repository secrets." >&2
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/mac-signing-cert.p12"
          PASSWORD_CLEAN="$(printf '%s' "$MAC_CERTIFICATE_PASSWORD" | tr -d '\r')"

          # Decode with GNU coreutils first, then BSD base64 for macOS compatibility.
          if ! printf '%s' "$MAC_CERTIFICATE" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            printf '%s' "$MAC_CERTIFICATE" | base64 -D > "$CERT_PATH"
          fi

          if [ ! -s "$CERT_PATH" ]; then
            echo "Decoded certificate file is empty. Check MAC_CERTIFICATE content." >&2
            exit 1
          fi

          # Validate that file is a valid PKCS#12 and password matches.
          if ! openssl pkcs12 -in "$CERT_PATH" -nokeys -passin "pass:$PASSWORD_CLEAN" >/dev/null 2>&1; then
            echo "Invalid PKCS#12 certificate or wrong password. Re-export the certificate with private key (.p12) and update secrets." >&2
            exit 1
          fi

          # Run the same import mechanism used by electron-builder to fail early with a clear error.
          TMP_KEYCHAIN="$RUNNER_TEMP/mac-signing-check.keychain-db"
          TMP_KEYCHAIN_PASSWORD="temp-pass-$(date +%s)"
          security create-keychain -p "$TMP_KEYCHAIN_PASSWORD" "$TMP_KEYCHAIN"
          security unlock-keychain -p "$TMP_KEYCHAIN_PASSWORD" "$TMP_KEYCHAIN"

          # Some .p12 generated on Linux/OpenSSL are valid for openssl but rejected by macOS security.
          if ! security import "$CERT_PATH" -k "$TMP_KEYCHAIN" -P "$PASSWORD_CLEAN" -T /usr/bin/codesign -T /usr/bin/productbuild >/dev/null 2>&1; then
            echo "Initial macOS import failed, trying PKCS#12 compatibility conversion..." >&2
            PEM_PATH="$RUNNER_TEMP/mac-signing-cert.pem"
            COMPAT_CERT_PATH="$RUNNER_TEMP/mac-signing-cert-compat.p12"

            # Re-export with legacy algorithms for better Keychain compatibility.
            openssl pkcs12 -in "$CERT_PATH" -passin "pass:$PASSWORD_CLEAN" -nodes -out "$PEM_PATH"

            # Some openssl builds (e.g. LibreSSL) do not support -legacy.
            if openssl pkcs12 -help 2>&1 | grep -q -- '-legacy'; then
              openssl pkcs12 -export -in "$PEM_PATH" -out "$COMPAT_CERT_PATH" -passout "pass:$PASSWORD_CLEAN" -legacy
            else
              openssl pkcs12 -export -in "$PEM_PATH" -out "$COMPAT_CERT_PATH" -passout "pass:$PASSWORD_CLEAN" \
                -keypbe PBE-SHA1-3DES -certpbe PBE-SHA1-3DES -macalg sha1
            fi

            if [ ! -s "$COMPAT_CERT_PATH" ]; then
              echo "Compatibility conversion failed: generated .p12 is empty." >&2
              security delete-keychain "$TMP_KEYCHAIN" || true
              exit 1
            fi

            if ! security import "$COMPAT_CERT_PATH" -k "$TMP_KEYCHAIN" -P "$PASSWORD_CLEAN" -T /usr/bin/codesign -T /usr/bin/productbuild >/dev/null 2>&1; then
              echo "macOS security import failed after compatibility conversion. Re-export certificate from macOS Keychain (cert + private key) and update secrets." >&2
              security delete-keychain "$TMP_KEYCHAIN" || true
              exit 1
            fi

            CERT_PATH="$COMPAT_CERT_PATH"
          fi

          security delete-keychain "$TMP_KEYCHAIN"

          echo "MAC_CERTIFICATE_PATH=$CERT_PATH" >> "$GITHUB_ENV"
          echo "MAC_CERTIFICATE_PASSWORD_CLEAN=$PASSWORD_CLEAN" >> "$GITHUB_ENV"
      - name: Generate Windows self-signed cert
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          CS_PFX_PATH: ${{ github.workspace }}\ci-selfsigned.pfx
          CS_PFX_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:CS_PFX_PASSWORD)) {
            throw "WIN_CERT_PASSWORD is empty. Set secrets.WIN_CERT_PASSWORD."
          }
          Write-Host "[cert] Creating self-signed cert";
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=CelyaVox CI" -CertStoreLocation "Cert:\CurrentUser\My" -KeyExportPolicy Exportable
          Write-Host "[cert] Converting password";
          $pwd = ConvertTo-SecureString -String $env:CS_PFX_PASSWORD -Force -AsPlainText
          Write-Host "[cert] Exporting PFX to $env:CS_PFX_PATH";
          Export-PfxCertificate -Cert $cert -FilePath $env:CS_PFX_PATH -Password $pwd -Force | Out-Null
          $cerPath = Join-Path $env:GITHUB_WORKSPACE "ci-selfsigned.cer"
          Write-Host "[cert] Exporting CER to $cerPath";
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null
          Write-Host "[cert] Trusting CER via certutil (CurrentUser Root)";
          $certutil = Start-Process -FilePath certutil.exe -ArgumentList @('-user','-addstore','-f','Root',"$cerPath") -NoNewWindow -PassThru
          if (-not (Wait-Process -Id $certutil.Id -Timeout 30 -ErrorAction SilentlyContinue)) {
            Write-Host "[cert] certutil timed out; skipping trust import";
            Stop-Process -Id $certutil.Id -Force -ErrorAction SilentlyContinue
          }
          Write-Host "[cert] Done";
      - name: Build for Linux
        if: matrix.platform == 'linux'
        run: npm run dist:linux:prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build for Windows
        if: matrix.platform == 'windows'
        run: npm run dist:win:prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CS_PFX_PATH: ${{ github.workspace }}\ci-selfsigned.pfx
          CS_PFX_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          CSC_LINK: ${{ github.workspace }}\ci-selfsigned.pfx
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Build for macOS
        if: matrix.platform == 'mac'
        run: |
          echo "NOTARIZATION_TRANSIENT_FAILURE=0" >> "$GITHUB_ENV"
          echo "NOTARIZATION_STATUS=starting" >> "$GITHUB_ENV"
          npm run dist:mac:prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ env.MAC_CERTIFICATE_PATH }}
          CSC_KEY_PASSWORD: ${{ env.MAC_CERTIFICATE_PASSWORD_CLEAN }}
          CSC_NAME: ${{ secrets.MAC_CERTIFICATE_NAME }}
          NOTARIZE_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARIZE_APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          NOTARIZE_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZE_MAX_ATTEMPTS: "1"
          NOTARIZE_ALLOW_TRANSIENT_FAILURE: "true"
      - name: Build for Linux (dev)
        if: matrix.platform == 'linux'
        run: npm run dist:linux:dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build for Windows (dev)
        if: matrix.platform == 'windows'
        run: npm run dist:win:dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CS_PFX_PATH: ${{ github.workspace }}\ci-selfsigned.pfx
          CS_PFX_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          CSC_LINK: ${{ github.workspace }}\ci-selfsigned.pfx
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Verify Windows signatures
        if: matrix.platform == 'windows'
        shell: pwsh
        continue-on-error: true
        run: |
          $signtool = (Get-Command signtool -ErrorAction SilentlyContinue)?.Source
          if(-not $signtool){
            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          }
          if(-not $signtool){
            choco install windows-sdk-10.0.19041.0 -y --no-progress
            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          }
          if(-not $signtool){
            throw "signtool.exe not found"
          }
          Get-ChildItem -Path dist -Filter *.exe | ForEach-Object { & $signtool verify /pa /v $_.FullName }
          Get-ChildItem -Path dist -Filter *.msi | ForEach-Object { & $signtool verify /pa /v $_.FullName }
      - name: Build for macOS (dev)
        if: matrix.platform == 'mac'
        run: |
          echo "NOTARIZATION_TRANSIENT_FAILURE=0" >> "$GITHUB_ENV"
          echo "NOTARIZATION_STATUS=starting" >> "$GITHUB_ENV"
          npm run dist:mac:dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ env.MAC_CERTIFICATE_PATH }}
          CSC_KEY_PASSWORD: ${{ env.MAC_CERTIFICATE_PASSWORD_CLEAN }}
          CSC_NAME: ${{ secrets.MAC_CERTIFICATE_NAME }}
          NOTARIZE_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARIZE_APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          NOTARIZE_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZE_MAX_ATTEMPTS: "1"
          NOTARIZE_ALLOW_TRANSIENT_FAILURE: "true"
      - name: Staple and verify macOS artifacts
        if: matrix.platform == 'mac' && env.NOTARIZATION_TRANSIENT_FAILURE != '1'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_ID_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "Cannot staple: Apple notarization credentials are missing (APPLE_ID / APPLE_ID_PASSWORD / APPLE_TEAM_ID)." >&2
            exit 1
          fi

          APP_BUNDLES=()
          DMG_FILES=()

          while IFS= read -r app; do
            APP_BUNDLES+=("$app")
          done < <(find dist -type d -name "*.app")

          while IFS= read -r dmg; do
            DMG_FILES+=("$dmg")
          done < <(find dist -type f -name "*.dmg")

          if [ "${#APP_BUNDLES[@]}" -eq 0 ] && [ "${#DMG_FILES[@]}" -eq 0 ]; then
            echo "No macOS artifacts found to staple."
            exit 1
          fi

          for app in "${APP_BUNDLES[@]}"; do
            echo "Stapling app: $app"
            xcrun stapler staple -v "$app"
          done

          for dmg in "${DMG_FILES[@]}"; do
            echo "Stapling dmg: $dmg"
            xcrun stapler staple -v "$dmg"
          done

          if [ "${#APP_BUNDLES[@]}" -gt 0 ]; then
            echo "Gatekeeper check on first app bundle"
            spctl -a -vvv -t install "${APP_BUNDLES[0]}"
          fi
      - name: Verify macOS code signatures
        if: matrix.platform == 'mac' && env.NOTARIZATION_TRANSIENT_FAILURE != '1'
        shell: bash
        run: |
          set -euo pipefail

          APP_BUNDLES=()
          DMG_FILES=()

          while IFS= read -r app; do
            APP_BUNDLES+=("$app")
          done < <(find dist -type d -name "*.app")

          while IFS= read -r dmg; do
            DMG_FILES+=("$dmg")
          done < <(find dist -type f -name "*.dmg")

          if [ "${#APP_BUNDLES[@]}" -eq 0 ] || [ "${#DMG_FILES[@]}" -eq 0 ]; then
            echo "Missing macOS artifacts: expected at least one .app and one .dmg in dist/." >&2
            exit 1
          fi

          for app in "${APP_BUNDLES[@]}"; do
            echo "Checking app signature: $app"
            codesign --verify --verbose=4 --deep --strict "$app"
            spctl -a -vvv -t execute "$app"
          done

          for dmg in "${DMG_FILES[@]}"; do
            echo "Checking dmg signature: $dmg"
            codesign --verify --verbose=4 --strict "$dmg"
            spctl -a -vvv -t open --context context:primary-signature "$dmg"
          done
      - name: Report notarization transient status
        if: matrix.platform == 'mac' && env.NOTARIZATION_TRANSIENT_FAILURE == '1'
        shell: bash
        run: |
          echo "Notarization was skipped after repeated transient Apple server errors (HTTP 500)."
          echo "Artifacts are signed but may not be notarized/stapled for this run."
      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.msi
            dist/*.exe
      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip
      - name: Upload Linux dev artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-dev
          path: |
            dist/*dev*.AppImage
            dist/*dev*.deb
            dist/*dev*.rpm
      - name: Upload Windows dev artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-dev
          path: |
            dist/*dev*.msi
            dist/*dev*.exe
      - name: Upload macOS dev artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-dev
          path: |
            dist/*dev*.dmg
            dist/*dev*.zip
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux-build/*
            artifacts/windows-build/*
            artifacts/macos-build/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
